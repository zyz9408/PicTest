<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PicTest API</title>
    <link rel="stylesheet" href="styles.css?v=20260708-5" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <p class="eyebrow">Image URL API</p>
        <h1>PicTest API</h1>
        <p class="summary">给其它前端 app 读取的随机分流直链接口；页面只显示接口内容，不主动加载图片。</p>
      </header>

      <section class="toolbar" aria-live="polite">
        <button id="reloadButton" type="button">刷新接口</button>
        <button id="copyAllButton" type="button">复制全部直链</button>
        <button id="copyApiButton" type="button">复制接口地址</button>
        <span id="status">等待加载</span>
      </section>

      <section id="gallery" class="gallery" aria-label="图片清单"></section>
    </main>

    <template id="imageCardTemplate">
      <article class="image-card">
        <div class="image-copy">
          <h2></h2>
          <p></p>
          <code class="asset-path"></code>
          <p class="mirror-name"></p>
          <div class="link-row">
            <code class="direct-link"></code>
            <button class="copy-link" type="button">复制</button>
          </div>
        </div>
      </article>
    </template>

    <script src="api/images.js?v=20260708-5"></script>
    <script src="script.js?v=20260708-5"></script>
  </body>
</html>
