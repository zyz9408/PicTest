<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PicTest Links</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <p class="eyebrow">Image Direct Links</p>
        <h1>PicTest Links</h1>
        <p class="summary">GitHub Pages 图片直链与镜像分流清单。</p>
      </header>

      <section class="toolbar" aria-live="polite">
        <label class="field">
          <span>分流</span>
          <select id="strategySelect">
            <option value="hash">按文件固定</option>
            <option value="random">随机镜像</option>
            <option value="primary">主源优先</option>
          </select>
        </label>
        <button id="reloadButton" type="button">刷新</button>
        <button id="copyAllButton" type="button">复制全部直链</button>
        <span id="status">等待加载</span>
      </section>

      <section id="gallery" class="gallery" aria-label="图片列表"></section>
    </main>

    <template id="imageCardTemplate">
      <article class="image-card">
        <a class="image-frame" target="_blank" rel="noopener noreferrer">
          <span class="loading">Loading</span>
        </a>
        <div class="image-copy">
          <h2></h2>
          <p></p>
          <div class="link-row">
            <code class="direct-link"></code>
            <button class="copy-link" type="button">复制</button>
          </div>
          <div class="mirror-list" aria-label="镜像地址"></div>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
